name: CI Pipeline - Diff Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize]

jobs:
  diff-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: |
          # Define a base para comparação (PR ou commit anterior)
          TARGET_BRANCH="${{ github.base_ref }}"
          if [ -z "$TARGET_BRANCH" ]; then
            BASE="HEAD~1"
          else
            git fetch origin $TARGET_BRANCH --depth=1
            BASE="origin/$TARGET_BRANCH"
          fi
          git diff $BASE > content.diff

      - name: Analyze diff via n8n
        run: |
          # Verifica se há conteúdo no content.diff
          if [ ! -s content.diff ]; then
            echo '{"risco": "baixo", "razao": "Nenhuma alteração para analisar", "sugestao": ""}' > result.json
            echo "Nenhuma alteração detectada, pulando análise"
            exit 0
          fi

          echo "Enviando diff para análise via n8n..."
          RESPONSE=$(curl -s -X POST \
            -F "data=@content.diff" \
            "${{ secrets.N8N_WEBHOOK_URL }}")

          echo "$RESPONSE" > result.json
          echo "Resultado da análise:"
          cat result.json | python3 -m json.tool 2>/dev/null || cat result.json

      - name: Notify Teams and Fail if HIGH risk
        run: |
          RISK=$(python3 -c "import json; print(json.load(open('result.json')).get('risco','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          RAZAO=$(python3 -c "import json; print(json.load(open('result.json')).get('razao','N/A'))" 2>/dev/null || echo "N/A")
          SUGESTAO=$(python3 -c "import json; print(json.load(open('result.json')).get('sugestao','N/A'))" 2>/dev/null || echo "N/A")
          
          # Formata a mensagem
          MESSAGE="**Análise de Código:** Risco: ${RISK^^} | Razão: $RAZAO | Sugestão: $SUGESTAO"
          # Gera o payload JSON escapando corretamente aspas e quebras de linha
          JSON_PAYLOAD=$(python3 -c "import json, sys; print(json.dumps({'message': sys.argv[1]}))" "$MESSAGE")
          
          if [ -n "${{ secrets.TEAMS_SEND_MESSAGE_URL }}" ]; then
            echo "Enviando notificação para o Teams..."
            curl -s -X POST -H "Content-Type: application/json" -d "$JSON_PAYLOAD" "${{ secrets.TEAMS_SEND_MESSAGE_URL }}"
          fi

          echo "Risk level: $RISK"

          if [ "$RISK" = "alto" ]; then
            echo "::error::🚨 Alto risco de alteração detectada!"
            echo "Razão: $RAZAO"
            echo "Sugestão: $SUGESTAO"
            exit 1
          fi

          echo "✅ Nível de risco aceitável: $RISK"